# 后端、前端、浏览器和生产表面检查共同构成合并门禁。
name: CI
on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: pip }
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy
      - run: pytest
      - run: pytest -q -o addopts='' --cov=yuwang.agent --cov-report=term-missing --cov-fail-under=90 tests
      - run: python scripts/check_production_surface.py

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: apps/web/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e-and-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: pip install -e .
      - run: npm ci
        working-directory: apps/web
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - run: npm run e2e
        working-directory: apps/web
      - name: Generate ephemeral deployment secrets
        shell: bash
        run: |
          echo "YUWANG_MASTER_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> "$GITHUB_ENV"
          echo "YUWANG_ADMIN_TOKEN=$(python -c 'import secrets; print(secrets.token_urlsafe(32))')" >> "$GITHUB_ENV"
      - run: docker compose config --quiet
      - run: docker compose build
      - run: docker run --rm yuwang-api sh -c "test ! -d /app/tests && test ! -d /app/apps/web"
      - run: docker run --rm yuwang-api python -c "import pathlib,re; roots=[pathlib.Path('/app/src'),pathlib.Path('/app/apps/api')]; assert not any(re.search(r'\\bmo' r'ck\\b', p.read_text(errors='ignore'), re.I) for root in roots for p in root.rglob('*.py'))"
      - run: docker run --rm yuwang-web sh -c "! grep -Ril -E '\\b[mM][oO][cC][kK]\\b' /usr/share/nginx/html"
      - name: Compose health and restart recovery
        shell: bash
        run: |
          docker compose up -d --wait
          curl --fail --silent http://localhost:8080/api/v1/health | python -c "import json,sys; assert json.load(sys.stdin)['version'] == '0.3.0'"
          THREAD_ID=$(curl --fail --silent -X POST -H 'Content-Type: application/json' -d '{"title":"ci-recovery","mode":"normal"}' http://localhost:8080/api/v1/threads | python -c "import json,sys; print(json.load(sys.stdin)['id'])")
          docker compose restart
          for attempt in {1..60}; do curl --fail --silent http://localhost:8080/api/v1/health >/dev/null && break; sleep 1; done
          curl --fail --silent "http://localhost:8080/api/v1/threads/$THREAD_ID" | python -c "import json,sys; assert json.load(sys.stdin)['title'] == 'ci-recovery'"
      - if: always()
        run: docker compose down
