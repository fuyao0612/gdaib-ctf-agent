# 后端、前端、浏览器和生产表面检查共同构成合并门禁。
name: CI
on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: '3.11', cache: pip }
      - run: pip install -r requirements.lock
      - run: pip install --no-deps -e .
      - run: ruff check .
      - run: mypy
      - run: pytest
      - run: python scripts/check_dependency_locks.py
      - run: pytest -q -o addopts='' --cov=yuwang.agent --cov-report=term-missing --cov-fail-under=90 tests
      - run: python scripts/check_production_surface.py

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22, cache: npm, cache-dependency-path: apps/web/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e-and-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: '3.11' }
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22 }
      - run: pip install -r requirements.runtime.lock
      - run: pip install --no-deps -e .
      - run: npm ci
        working-directory: apps/web
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - name: Generate ephemeral deployment secrets
        shell: bash
        run: |
          master_key=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')
          echo "::add-mask::$master_key"
          echo "YUWANG_MASTER_KEY=$master_key" >> "$GITHUB_ENV"
      - run: npm run e2e
        working-directory: apps/web
      - run: docker compose config --quiet
      - run: docker compose build
      - run: docker run --rm yuwang-api sh -c "test ! -d /app/tests && test ! -d /app/apps/web"
      - run: docker run --rm yuwang-api python -c "import pathlib,re; roots=[pathlib.Path('/app/src'),pathlib.Path('/app/apps/api')]; assert not any(re.search(r'\\bmo' r'ck\\b', p.read_text(errors='ignore'), re.I) for root in roots for p in root.rglob('*.py'))"
      - run: docker run --rm yuwang-web sh -c "! grep -Ril -E '\\b[mM][oO][cC][kK]\\b' /usr/share/nginx/html"
      - name: Compose health and restart recovery
        shell: bash
        run: |
          docker compose up -d --wait
          curl --fail --silent http://localhost:8080/api/v1/health | python scripts/check_health_version.py
          cookies=$(mktemp)
          create_session() {
            curl --fail --silent -c "$cookies" -X POST http://localhost:8080/api/v1/admin/session | python -c "import json,sys; print(json.load(sys.stdin)['csrf_token'])"
          }
          csrf_token=$(create_session)
          THREAD_ID=$(curl --fail --silent -b "$cookies" -X POST -H "X-CSRF-Token: $csrf_token" -H 'Content-Type: application/json' -d '{"title":"ci-recovery","mode":"normal"}' http://localhost:8080/api/v1/threads | python -c "import json,sys; print(json.load(sys.stdin)['id'])")
          docker compose restart
          for attempt in {1..60}; do curl --fail --silent http://localhost:8080/api/v1/health >/dev/null && break; sleep 1; done
          csrf_token=$(create_session)
          curl --fail --silent -b "$cookies" -H "X-CSRF-Token: $csrf_token" "http://localhost:8080/api/v1/threads/$THREAD_ID" | python -c "import json,sys; assert json.load(sys.stdin)['title'] == 'ci-recovery'"
      - if: always()
        shell: bash
        run: |
          docker compose down
