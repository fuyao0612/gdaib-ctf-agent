# 单机生产拓扑：初始化数据权限后启动 API，并由 Web 反向代理统一暴露。
name: yuwang
services:
  data-init:
    image: alpine:3.20
    command: ["sh", "-c", "mkdir -p /data/artifacts && chown -R 10001:10001 /data"]
    volumes:
      - ${YUWANG_DATA_PATH:-./data}:/data
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      YUWANG_DATABASE_PATH: /data/yuwang.db
      YUWANG_ARTIFACT_ROOT: /data/artifacts
      YUWANG_CORS_ORIGINS: ${YUWANG_CORS_ORIGINS:-http://127.0.0.1:8080,http://localhost:8080}
      YUWANG_COOKIE_SECURE: ${YUWANG_COOKIE_SECURE:-false}
      YUWANG_MASTER_KEY: ${YUWANG_MASTER_KEY:?Set YUWANG_MASTER_KEY in .env}
    volumes:
      - ${YUWANG_DATA_PATH:-./data}:/data
    depends_on:
      data-init:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 3s
      timeout: 2s
      retries: 15
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: ${YUWANG_API_CPUS:-1.0}
          memory: ${YUWANG_API_MEMORY:-768M}

  web:
    build:
      context: apps/web
    ports:
      - "${YUWANG_WEB_PORT:-8080}:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/"]
      interval: 3s
      timeout: 2s
      retries: 15
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=32m,noexec,nosuid,nodev
      - /var/run:size=4m,noexec,nosuid,nodev
      - /tmp:size=16m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          cpus: ${YUWANG_WEB_CPUS:-0.5}
          memory: ${YUWANG_WEB_MEMORY:-192M}
