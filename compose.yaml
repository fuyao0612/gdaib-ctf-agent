name: yuwang
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      YUWANG_DATABASE_PATH: /data/yuwang.db
      YUWANG_ARTIFACT_ROOT: /data/artifacts
      YUWANG_CORS_ORIGINS: http://localhost:8080
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_MODEL: ${OPENAI_COMPATIBLE_MODEL:-}
    volumes:
      - yuwang-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 3s
      timeout: 2s
      retries: 15
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  web:
    build:
      context: apps/web
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/"]
      interval: 3s
      timeout: 2s
      retries: 15
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

volumes:
  yuwang-data:
